<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flash Ofertas</title>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/style.css" />
    <style>
      .tabs {
        display: flex;
        gap: 8px;
        margin-bottom: 1.5rem;
        flex-wrap: wrap;
      }
      .tab-btn {
        font-family: "DM Sans", sans-serif;
        font-size: 13px;
        font-weight: 500;
        padding: 8px 18px;
        border: 1px solid var(--border);
        border-radius: 20px;
        background: var(--surface);
        color: var(--muted);
        cursor: pointer;
        transition: all 0.15s;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .tab-btn:hover {
        border-color: var(--text);
        color: var(--text);
      }
      .tab-btn.active {
        background: var(--text);
        color: var(--accent);
        border-color: var(--text);
      }
      .tab-btn.shopee.active {
        background: #ee4d2d;
        border-color: #ee4d2d;
        color: #fff;
      }
      .tab-btn.amazon.active {
        background: #ff9900;
        border-color: #ff9900;
        color: #000;
      }
      .platform-badge {
        display: inline-block;
        font-size: 10px;
        font-family: "DM Mono", monospace;
        padding: 2px 6px;
        border-radius: 4px;
        margin-bottom: 4px;
        font-weight: 500;
      }
      .platform-ml {
        background: #fff1cb;
        color: #000;
      }
      .platform-shopee {
        background: #ee4d2d;
        color: #fff;
      }
      .platform-amazon {
        background: #ff9900;
        color: #000;
      }
      .rating {
        font-size: 11px;
        color: var(--muted);
        font-family: "DM Mono", monospace;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="logo">flash<span>_ofertas</span></div>
    </header>
    <div class="main">
      <div class="tabs">
        <button class="tab-btn active" onclick="setTab('ml-categoria')">
          📂 ML Categorias
        </button>
        <button class="tab-btn" onclick="setTab('ml-relampago')">
          ⚡ ML Relâmpago
        </button>
        <button class="tab-btn shopee" onclick="setTab('shopee-relampago')">
          🛍 Shopee Flash
        </button>
        <button class="tab-btn amazon" onclick="setTab('amazon-ofertas')">
          🛒 Amazon Ofertas
        </button>
      </div>

      <div id="catRow">
        <div class="config-card">
          <h2>Categoria — Mercado Livre</h2>
          <div class="fields-row">
            <div class="field">
              <label>Categoria</label>
              <select id="categorySelect">
                <option value="">Selecione uma categoria...</option>
              </select>
            </div>
            <button class="btn" id="btnBuscar" onclick="buscarProdutos()">
              Buscar →
            </button>
          </div>
        </div>
      </div>

      <div class="filter-bar">
        <label class="toggle-label">
          <input
            type="checkbox"
            id="onlyDiscount"
            checked
            onchange="renderProducts()"
          />
          Somente com desconto
        </label>
        <span class="count" id="countBadge"></span>
      </div>

      <div class="status" id="status"></div>
      <div id="output">
        <div class="empty-state">
          <div class="icon">🛍</div>
          Selecione uma aba para começar.
        </div>
      </div>
    </div>

    <script src="./js/ofertas-ml.js"></script>
    <script src="./js/ofertas-shopee.js"></script>
    <script src="./js/ofertas-amazon.js"></script>
    <script src="./js/app.js"></script>
  </body>
</html>
