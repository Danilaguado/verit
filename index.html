<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flash Ofertas</title>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/style.css" />
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        margin: 0;
        overflow: hidden;
      }

      header {
        display: flex;
        align-items: center;
        padding: 1rem 2rem;
        background: var(--text);
        color: var(--accent);
        flex-shrink: 0;
      }
      .logo {
        font-family: "DM Mono", monospace;
        font-size: 18px;
        font-weight: 500;
      }
      .logo span {
        color: #fff;
      }

      /* Layout principal em coluna, 100vh */
      .app {
        display: flex;
        flex-direction: column;
        height: 100vh;
      }

      /* Controles fixos no topo */
      .controls {
        flex-shrink: 0;
        padding: 1rem 2rem 0;
        background: var(--bg);
      }
      .search-row {
        margin-bottom: 0.75rem;
      }
      .search-row input {
        width: 100%;
        font-family: "DM Sans", sans-serif;
        font-size: 14px;
        padding: 10px 14px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--surface);
        color: var(--text);
        outline: none;
      }
      .search-row input:focus {
        border-color: var(--text);
      }
      .cat-filters {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        padding-bottom: 0.75rem;
      }
      .cat-btn {
        font-family: "DM Sans", sans-serif;
        font-size: 12px;
        font-weight: 500;
        padding: 5px 14px;
        border: 1px solid var(--border);
        border-radius: 20px;
        background: var(--surface);
        color: var(--muted);
        cursor: pointer;
        transition: all 0.15s;
        white-space: nowrap;
      }
      .cat-btn:hover {
        border-color: var(--text);
        color: var(--text);
      }
      .cat-btn.active {
        background: var(--text);
        color: var(--accent);
        border-color: var(--text);
      }
      .info-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0.5rem 0 0.75rem;
      }
      .status {
        font-family: "DM Mono", monospace;
        font-size: 12px;
        color: var(--muted);
      }
      .count {
        font-family: "DM Mono", monospace;
        font-size: 12px;
        color: var(--muted);
      }

      /* Área de produtos com scroll interno — ocupa o espaço restante */
      .produtos-scroll {
        flex: 1;
        overflow-y: auto;
        padding: 0 2rem;
      }

      /* Grid */
      .grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
        padding: 0.5rem 0;
      }
      @media (min-width: 600px) {
        .grid {
          grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        }
      }

      /* Cards */
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        transition:
          transform 0.15s,
          box-shadow 0.15s;
      }
      .card:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 24px rgba(0, 0, 0, 0.07);
      }
      .card-img {
        width: 100%;
        height: 130px;
        object-fit: contain;
        background: var(--bg);
        padding: 8px;
      }
      .card-body {
        padding: 10px;
        display: flex;
        flex-direction: column;
        gap: 4px;
        flex: 1;
      }
      .card-title {
        font-size: 12px;
        line-height: 1.4;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .card-prices {
        margin-top: auto;
        padding-top: 6px;
      }
      .original {
        font-size: 11px;
        color: var(--muted);
        text-decoration: line-through;
      }
      .current {
        font-size: 15px;
        font-weight: 600;
      }
      .badge {
        display: inline-block;
        font-size: 10px;
        font-family: "DM Mono", monospace;
        background: var(--green-bg);
        color: var(--green);
        padding: 2px 6px;
        border-radius: 4px;
        margin-top: 2px;
      }
      .card-link {
        display: block;
        font-size: 11px;
        font-family: "DM Mono", monospace;
        color: var(--muted);
        text-decoration: none;
        padding: 7px 10px;
        border-top: 1px solid var(--border);
      }
      .card-link:hover {
        background: var(--bg);
        color: var(--text);
      }

      /* Plataformas */
      .platform-badge {
        display: inline-block;
        font-size: 10px;
        font-family: "DM Mono", monospace;
        padding: 2px 6px;
        border-radius: 4px;
        font-weight: 500;
      }
      .platform-ml {
        background: #fff1cb;
        color: #000;
      }
      .platform-shopee {
        background: #ee4d2d;
        color: #fff;
      }
      .platform-amazon {
        background: #ff9900;
        color: #000;
      }

      /* Paginação fixa no fundo */
      .pagination-bar {
        flex-shrink: 0;
        display: flex;
        gap: 6px;
        justify-content: center;
        flex-wrap: wrap;
        padding: 0.75rem 2rem;
        background: var(--bg);
        border-top: 1px solid var(--border);
      }
      .page-btn {
        font-family: "DM Mono", monospace;
        font-size: 13px;
        padding: 6px 12px;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: var(--surface);
        color: var(--text);
        cursor: pointer;
        transition: all 0.15s;
      }
      .page-btn:hover {
        background: var(--bg);
        border-color: var(--text);
      }
      .page-btn.active {
        background: var(--text);
        color: var(--accent);
        border-color: var(--text);
      }
      .page-btn:disabled {
        opacity: 0.3;
        cursor: not-allowed;
      }

      .empty-state {
        text-align: center;
        padding: 3rem 2rem;
        color: var(--muted);
        font-family: "DM Mono", monospace;
        font-size: 14px;
      }
      .empty-state .icon {
        font-size: 32px;
        margin-bottom: 1rem;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header>
        <div class="logo">flash<span>_ofertas</span></div>
        <a
          href="./tools/extrator-amazon.html"
          target="_blank"
          style="
            margin-left: auto;
            font-family: &quot;DM Mono&quot;, monospace;
            font-size: 12px;
            color: #000;
            background: #ff9900;
            padding: 6px 14px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 500;
          "
          >🛒 Extrator</a
        >
      </header>

      <div class="controls">
        <div class="search-row">
          <input
            type="text"
            id="searchInput"
            placeholder="🔍 Buscar entre todas as ofertas..."
          />
        </div>
        <div class="cat-filters" id="catFilters"></div>
        <div class="info-bar">
          <span class="status" id="status"></span>
          <span class="count" id="countBadge"></span>
        </div>
      </div>

      <!-- Área com scroll interno -->
      <div class="produtos-scroll" id="produtosScroll">
        <div id="output">
          <div class="empty-state">
            <div class="icon">⚡</div>
            Carregando ofertas...
          </div>
        </div>
      </div>

      <!-- Paginação fixa no rodapé -->
      <div class="pagination-bar" id="pagination"></div>
    </div>

    <script src="./js/ofertas-ml.js"></script>
    <script src="./js/ofertas-shopee.js"></script>
    <script src="./js/ofertas-amazon.js"></script>
    <script src="./js/app.js"></script>
  </body>
</html>
