<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Flash Ofertas</title>
    <link rel="manifest" href="./manifest.json" />
    <meta name="theme-color" content="#e8304a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <link rel="icon" type="image/png" href="./assets/favicon.png" />
    <link rel="apple-touch-icon" href="./assets/favicon.png" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/base.css" />
    <link rel="stylesheet" href="./css/header.css" />
    <link rel="stylesheet" href="./css/home.css" />
    <link rel="stylesheet" href="./css/controls.css" />
    <link rel="stylesheet" href="./css/products.css" />
    <link rel="stylesheet" href="./css/pagination.css" />
    <link rel="stylesheet" href="./css/loader.css" />
  </head>
  <body>
    <div id="loader" class="loader" style="display: none">
      <div class="loader-dots"><span></span><span></span><span></span></div>
    </div>

    <div class="app">
      <!-- HEADER -->
      <header>
        <a href="#" class="site-logo">
          <img
            src="./assets/logo.png"
            alt="Flash Ofertas"
            onerror="
              this.style.display = 'none';
              this.nextElementSibling.style.display = 'flex';
            "
          />
          <span class="site-logo-fallback" style="display: none">⚡</span>
        </a>
        <div class="header-search">
          <input
            type="text"
            id="searchInput"
            placeholder="Buscar ofertas..."
            onkeydown="if (event.key === 'Enter') Search.run();"
          />
          <button class="search-btn" onclick="Search.run()" title="Buscar">
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
            >
              <polyline points="9 18 15 12 9 6" />
            </svg>
          </button>
        </div>
        <button
          class="btn-login"
          onclick="SheetsSync.syncProducts(State.allProducts)"
          style="background: #107c41; border-color: #107c41"
        >
          📊 Sincronizar Sheets
        </button>

        <button
          class="btn-login"
          onclick="PdfGenerator.generate(State.filteredList)"
          style="background: #f26522; border-color: #f26522"
        >
          📄 Baixar Catálogo PDF
        </button>

        <button class="btn-login" onclick="Auth.openLogin()">👤 Entrar</button>
        <a
          href="./tools/extrator-amazon.html"
          target="_blank"
          class="extrator-btn"
          >🛒</a
        >
      </header>

      <!-- TELA HOME -->
      <div id="homeScreen">
        <div class="carousel-wrap">
          <div id="carousel"></div>
        </div>
        <a id="bannerFixo" href="#" class="banner-fixo">
          <img id="bannerFixoImg" src="" alt="" />
        </a>
        <a id="bannerSmartphone" href="#" class="banner-smartphone">
          <img id="bannerSmartphoneImg" src="" alt="" />
        </a>
        <div class="platform-filter-wrap">
          <button
            class="platform-btn active"
            data-platform="todas"
            onclick="PlatformFilter.set('todas')"
          >
            Todas
          </button>
          <button
            class="platform-btn ml"
            data-platform="ml"
            onclick="PlatformFilter.set('ml')"
          >
            Mercado Livre
          </button>
          <button
            class="platform-btn shopee"
            data-platform="shopee"
            onclick="PlatformFilter.set('shopee')"
          >
            Shopee
          </button>
          <button
            class="platform-btn amazon"
            data-platform="amazon"
            onclick="PlatformFilter.set('amazon')"
          >
            Amazon
          </button>
        </div>
        <div class="cat-carousel-wrap">
          <div class="cat-filters" id="catFilters"></div>
        </div>
        <div class="section-title">🔥 Confira o que temos para você</div>
      </div>

      <!-- TELA RESULTADOS -->
      <div id="resultsScreen" style="display: none">
        <div class="results-header">
          <button class="back-btn" onclick="Search.clear()">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
            >
              <polyline points="15 18 9 12 15 6" />
            </svg>
            Voltar
          </button>
          <span class="results-query" id="resultsQuery"></span>
        </div>
      </div>

      <!-- PRODUTOS -->
      <div class="produtos-scroll" id="produtosScroll">
        <div id="output">
          <div class="empty-state">
            <div class="icon">⚡</div>
            Carregando ofertas...
          </div>
        </div>
      </div>

      <div class="count-bar" id="countBar" style="display: none">
        <span class="count" id="countBadge"></span>
      </div>
      <div class="pagination-bar" id="pagination"></div>
    </div>

    <!-- ════ SCRIPTS (ordem importa!) ════════════════ -->

    <!-- 1. Recursos e dados -->
    <script src="./js/resources.js"></script>
    <script src="./js/ofertas-ml.js"></script>
    <script src="./js/ofertas-shopee.js"></script>
    <script src="./js/ofertas-amazon.js"></script>

    <!-- 2. Plataformas -->
    <script src="./js/platforms/ml.js"></script>
    <script src="./js/platforms/shopee.js"></script>
    <script src="./js/platforms/amazon.js"></script>
    <script src="./js/platforms/platform.js"></script>

    <!-- 3. Módulos (dependências primeiro) -->
    <script src="./modules/utils.js"></script>
    <script src="./modules/state.js"></script>
    <script src="./modules/auth.js"></script>
    <script src="./modules/countdown.js"></script>
    <script src="./modules/platform-filter.js"></script>
    <script src="./modules/filters.js"></script>
    <script src="./modules/products.js"></script>
    <script src="./modules/search.js"></script>
    <script src="./modules/sheetsSync.js"></script>
    <script src="./modules/pdfGenerator.js"></script>
    ```

    <!-- 4. Componentes -->
    <script src="./components/carousel.js"></script>
    <script src="./components/cards.js"></script>
    <script src="./components/pagination.js"></script>
    <script src="./components/searchPlaceholders.js"></script>

    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
    <!-- 5. Entrada -->
    <script src="./js/app.js"></script>
  </body>
</html>
