<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ML Ofertas</title>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/style.css" />
    <style>
      .tabs {
        display: flex;
        gap: 8px;
        margin-bottom: 1.5rem;
        flex-wrap: wrap;
      }
      .tab-btn {
        font-family: "DM Sans", sans-serif;
        font-size: 13px;
        font-weight: 500;
        padding: 8px 18px;
        border: 1px solid var(--border);
        border-radius: 20px;
        background: var(--surface);
        color: var(--muted);
        cursor: pointer;
        transition: all 0.15s;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .tab-btn:hover {
        border-color: var(--text);
        color: var(--text);
      }
      .tab-btn.active {
        background: var(--text);
        color: var(--accent);
        border-color: var(--text);
      }
    </style>
  </head>
  <body>
    <header>
      <div class="logo">ml<span>_ofertas</span></div>
    </header>

    <div class="main">
      <div class="tabs">
        <button class="tab-btn active" data-tab="categoria">
          📂 Por categoria
        </button>
        <button class="tab-btn" data-tab="relampago">
          ⚡ Ofertas relâmpago
        </button>
      </div>

      <div id="catRow">
        <div class="config-card">
          <h2>Configuração</h2>
          <div class="fields-row">
            <div class="field">
              <label>Categoria</label>
              <select id="categorySelect">
                <option value="">Selecione uma categoria...</option>
              </select>
            </div>
            <button class="btn" id="btnBuscar">Buscar →</button>
          </div>
        </div>
      </div>

      <div class="filter-bar">
        <label class="toggle-label">
          <input type="checkbox" id="onlyDiscount" checked />
          Somente com desconto
        </label>
        <span class="count" id="countBadge"></span>
      </div>

      <div class="status" id="status"></div>

      <div id="output">
        <div class="empty-state">
          <div class="icon">🛍</div>
          Selecione uma categoria ou veja as ofertas relâmpago.
        </div>
      </div>
    </div>

    <script src="./js/app.js"></script>
  </body>
</html>
