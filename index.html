<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flash Ofertas</title>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/style.css" />
    <style>
      header {
        display: flex;
        align-items: center;
      }
      .search-row {
        display: flex;
        gap: 10px;
        margin-bottom: 1rem;
        align-items: center;
        flex-wrap: wrap;
      }
      .search-row input {
        flex: 1;
        min-width: 200px;
        font-family: "DM Sans", sans-serif;
        font-size: 14px;
        padding: 10px 14px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--bg);
        color: var(--text);
        outline: none;
      }
      .search-row input:focus {
        border-color: var(--text);
      }
      .cat-filters {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        margin-bottom: 1.25rem;
      }
      .cat-btn {
        font-family: "DM Sans", sans-serif;
        font-size: 12px;
        font-weight: 500;
        padding: 5px 14px;
        border: 1px solid var(--border);
        border-radius: 20px;
        background: var(--surface);
        color: var(--muted);
        cursor: pointer;
        transition: all 0.15s;
        white-space: nowrap;
      }
      .cat-btn:hover {
        border-color: var(--text);
        color: var(--text);
      }
      .cat-btn.active {
        background: var(--text);
        color: var(--accent);
        border-color: var(--text);
      }
      .platform-badge {
        display: inline-block;
        font-size: 10px;
        font-family: "DM Mono", monospace;
        padding: 2px 6px;
        border-radius: 4px;
        font-weight: 500;
      }
      .platform-ml {
        background: #fff1cb;
        color: #000;
      }
      .platform-shopee {
        background: #ee4d2d;
        color: #fff;
      }
      .platform-amazon {
        background: #ff9900;
        color: #000;
      }
      .pagination {
        display: flex;
        gap: 6px;
        justify-content: center;
        flex-wrap: wrap;
        margin-top: 2rem;
        padding-bottom: 2rem;
      }
      .page-btn {
        font-family: "DM Mono", monospace;
        font-size: 13px;
        padding: 6px 12px;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: var(--surface);
        color: var(--text);
        cursor: pointer;
        transition: all 0.15s;
      }
      .page-btn:hover {
        background: var(--bg);
        border-color: var(--text);
      }
      .page-btn.active {
        background: var(--text);
        color: var(--accent);
        border-color: var(--text);
      }
      .page-btn:disabled {
        opacity: 0.3;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="logo">flash<span>_ofertas</span></div>
      <a
        href="./tools/extrator-amazon.html"
        target="_blank"
        style="
          margin-left: auto;
          font-family: &quot;DM Mono&quot;, monospace;
          font-size: 12px;
          color: #000;
          background: #ff9900;
          padding: 6px 14px;
          border-radius: 6px;
          text-decoration: none;
          font-weight: 500;
        "
        >🛒 Extrator Amazon</a
      >
    </header>

    <div class="main">
      <!-- Barra de busca -->
      <div class="search-row">
        <input
          type="text"
          id="searchInput"
          placeholder="🔍 Buscar entre todas as ofertas..."
        />
      </div>

      <!-- Filtros de categoria dinâmicos -->
      <div class="cat-filters" id="catFilters"></div>

      <div class="filter-bar">
        <label class="toggle-label">
          <input type="checkbox" id="onlyDiscount" checked />
          Somente com desconto
        </label>
        <span class="count" id="countBadge"></span>
      </div>

      <div class="status" id="status"></div>
      <div id="output">
        <div class="empty-state">
          <div class="icon">⚡</div>
          Carregando ofertas...
        </div>
      </div>
      <div class="pagination" id="pagination"></div>
    </div>

    <script src="./js/ofertas-ml.js"></script>
    <script src="./js/ofertas-shopee.js"></script>
    <script src="./js/ofertas-amazon.js"></script>
    <script src="./js/app.js"></script>
  </body>
</html>
